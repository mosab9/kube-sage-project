apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: {{ .Values.namespace }}
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      containers:
        - name: fluent-bit
          image: {{ .Values.fluentBit.image }}:{{ .Values.fluentBit.tag }}
          ports:
            - containerPort: 2020
              name: metrics
          resources:
            requests:
              cpu: {{ .Values.fluentBit.resources.requests.cpu }}
              memory: {{ .Values.fluentBit.resources.requests.memory }}
            limits:
              cpu: {{ .Values.fluentBit.resources.limits.cpu }}
              memory: {{ .Values.fluentBit.resources.limits.memory }}
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: journal
              mountPath: /run/log/journal
              readOnly: true
            - name: machineids
              mountPath: /etc/machine-id
              readOnly: true
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: journal
          hostPath:
            path: /run/log/journal
        - name: machineids
          hostPath:
            path: /etc/machine-id
