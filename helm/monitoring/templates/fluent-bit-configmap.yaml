apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: {{ .Values.namespace }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        5
        Log_Level    info
        Daemon       off
        Parsers_File parsers.conf

    [INPUT]
        Name             tail
        Path             /var/log/containers/*.log
        Parser           cri
        Tag              kube.*
        Mem_Buf_Limit    5MB
        Skip_Long_Lines  On
        Refresh_Interval 10

    [INPUT]
        Name            systemd
        Tag             node.*
        Systemd_Filter  _SYSTEMD_UNIT=k3s.service
        Systemd_Filter  _SYSTEMD_UNIT=k3s-agent.service
        Systemd_Filter  _SYSTEMD_UNIT=kubelet.service
        Systemd_Filter  _SYSTEMD_UNIT=containerd.service
        Systemd_Filter  _SYSTEMD_UNIT=docker.service
        Read_From_Tail  On
        Strip_Underscores On

    [INPUT]
        Name             tail
        Path             /var/log/syslog,/var/log/kern.log,/var/log/auth.log
        Tag              host.*
        Mem_Buf_Limit    5MB
        Skip_Long_Lines  On
        Refresh_Interval 10

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    [OUTPUT]
        Name        loki
        Match       kube.*
        Host        loki
        Port        3100
        Labels      job=fluent-bit, source=kubernetes
        Auto_Kubernetes_Labels On

    [OUTPUT]
        Name        loki
        Match       node.*
        Host        loki
        Port        3100
        Labels      job=fluent-bit, source=systemd
        Label_Keys  $SYSTEMD_UNIT

    [OUTPUT]
        Name        loki
        Match       host.*
        Host        loki
        Port        3100
        Labels      job=fluent-bit, source=host

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
